version: 2
updates:
  # keep used GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      actions-deps:
        patterns:
          - "*"
  # keep used Dockerfile up to date
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7 # Wait 7 days for any update
      semver-major-days: 14 # Wait 14 days for major version bumps
